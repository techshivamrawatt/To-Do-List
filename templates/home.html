<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To Do List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: #333;
        }

        form {
            margin: 20px auto;
        }

        input[type="text"] {
            padding: 10px;
            width: 250px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        input[type="submit"], input[type="button"] {
            padding: 10px 20px;
            border: none;
            background-color: #1f6bcf;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        input[type="submit"]:hover, input[type="button"]:hover {
            background-color: #1f6bcf;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>Welcome to do list</h1>
    <form method="POST" action="/submit">
        <input type="text" name="work" placeholder="Add new task"> 
        <input type="submit" value="Add"><br><br>
    </form> 
    <br><br>

    <a href="/view">
        <input type="button" value="View">
    </a>
</body>
</html>
